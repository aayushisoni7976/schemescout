<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>SchemeScout | Complete Profile</title>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen border-t-8 border-[#FF9933] py-10">

    <div class="w-full max-w-2xl bg-white shadow-2xl rounded-xl overflow-hidden border border-gray-200">
        <div class="bg-[#000080] p-6 text-center text-white">
            <h2 class="text-2xl font-bold uppercase tracking-widest">Complete Your Profile</h2>
            <p class="text-blue-100 text-sm opacity-80">Help us find the best government schemes for you</p>
        </div>

        <div class="p-4 bg-gray-100 flex justify-end items-center space-x-2 border-b">
            <label class="text-xs font-bold text-[#000080]">Voice Language:</label>
            <select id="langSelect" class="text-xs border border-[#000080] rounded px-2 py-1 focus:outline-none">
                <option value="en-IN">English (India)</option>
                <option value="hi-IN">हिन्दी (Hindi)</option>
                <option value="bn-IN">বাংলা (Bengali)</option>
                <option value="ne-NP">नेपाली (Nepali)</option>
            </select>
        </div>

        <form method="POST" action="{% url 'register' %}" class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700">Janam Tithi (Date of Birth)</label>
                <input type="date" name="dob" required
                    class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#FF9933] outline-none">
                <button type="button" onclick="startVoice('dob')"
                    class="absolute right-3 top-8 text-gray-400 hover:text-[#FF9933]">🎤</button>
            </div>

            <div class="relative"> <label class="block text-sm font-medium text-gray-700">Full Name (पूरा नाम)</label>
                <input type="text" name="fullname" id="fullname" required
                    class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#FF9933] outline-none">
                <button type="button" onclick="startVoice('fullname')"
                    class="absolute right-3 top-8 text-gray-400 hover:text-[#FF9933]">🎤</button>
            </div>

            <div>
                <label class="block text-sm font-semibold text-[#000080] mb-1">Gender (लिंग)</label>
                <select name="gender" required
                    class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#FF9933] outline-none">
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                    <option value="O">Other</option>
                </select>
            </div>

            <div class="relative">
                <label class="block text-sm font-semibold text-[#000080] mb-1">State (राज्य)</label>
                <input type="text" name="state" id="state" required
                    class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#FF9933] outline-none">
                <button type="button" onclick="startVoice('state')"
                    class="absolute right-3 top-8 text-gray-400 hover:text-[#FF9933]">🎤</button>
            </div>

            <div class="relative">
                <label class="block text-sm font-semibold text-[#000080] mb-1">Occupation (व्यवसाय)</label>
                <input type="text" name="occupation" id="occupation" required
                    class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#FF9933] outline-none">
                <button type="button" onclick="startVoice('occupation')"
                    class="absolute right-3 top-8 text-gray-400 hover:text-[#FF9933]">🎤</button>
            </div>

            <div class="relative">
                <label class="block text-sm font-semibold text-[#000080] mb-1">Annual Income (वार्षिक आय)</label>
                <input type="number" name="annualincome" id="annualincome" required
                    class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#FF9933] outline-none">
                <button type="button" onclick="startVoice('annualincome')"
                    class="absolute right-3 top-8 text-gray-400 hover:text-[#FF9933]">🎤</button>
            </div>

            <div>
                <label class="block text-sm font-semibold text-[#000080] mb-1">Category (श्रेणी)</label>
                <select name="category" required
                    class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#FF9933] outline-none">
                    <option value="General">General</option>
                    <option value="OBC">OBC</option>
                    <option value="SC">SC</option>
                    <option value="ST">ST</option>
                </select>
            </div>

            <div class="md:col-span-2 mt-4">
                <button type="submit"
                    class="w-full bg-[#000080] hover:bg-[#000066] text-white font-bold py-3 rounded-lg shadow-lg transform active:scale-95 transition-all uppercase tracking-widest">
                    Submit & View Schemes
                </button>
            </div>
        </form>
    </div>

    <script>
        function startVoice(fieldId) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;

            const recognition = new SpeechRecognition();
            recognition.lang = document.getElementById('langSelect').value;
            recognition.start();

            recognition.onresult = function (event) {
                let transcript = event.results[0][0].transcript.toLowerCase();

                if (fieldId === 'annualincome') {
                    // "1 Lac" ko "100000" mein badalne ka logic
                    let number = transcript.replace(/[^0-9.]/g, ''); // Pehle number nikalo (e.g., "1")
                    let value = parseFloat(number);

                    if (transcript.includes('lac') || transcript.includes('lakh')) {
                        value = value * 100000;
                    } else if (transcript.includes('crore') || transcript.includes('cr')) {
                        value = value * 10000000;
                    } else if (transcript.includes('thousand') || transcript.includes('hazar')) {
                        value = value * 1000;
                    }

                    document.getElementById(fieldId).value = value || number;
                } else if (fieldId === 'age') {
                    document.getElementById(fieldId).value = transcript.replace(/\D/g, '');
                } else {
                    document.getElementById(fieldId).value = transcript;
                }
            };
        }
    </script>
</body>

</html>
